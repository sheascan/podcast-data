<!DOCTYPE html>

<head>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #f8f9fa; color: #333; }

        audio { width: 100%; margin-top: 15px; filter: sepia(20%) saturate(70%) grayscale(100) contrast(99) invert(12%); }
        .footer { text-align: center; margin-top: 50px; font-size: 0.8em; color: #aaa; }
    </style>
</head>
