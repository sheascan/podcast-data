<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Podcast Briefing</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #f4f4f9; }
        .player-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #333; text-align: center; }
        audio { width: 100%; margin-top: 10px; }
        .tag { display: inline-block; background: #007bff; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>🎙️ Daily Briefings</h1>
    <p style="text-align: center;"><i>Automatically updated every day at 10:30 AM</i></p>

    <div class="player-card">
        <span class="tag">Politics</span>
        <audio controls src="data/outputs/Politics.mp3"></audio>
    </div>

    <div class="player-card">
        <span class="tag">Technology</span>
        <audio controls src="data/outputs/Technology.mp3"></audio>
    </div>

    <div class="player-card">
        <span class="tag">General</span>
        <audio controls src="data/outputs/General.mp3"></audio>
    </div>

    <div class="player-card">
        <span class="tag">Sport</span>
        <audio controls src="data/outputs/Sport.mp3"></audio>
    </div>
</body>
</html>
